<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SourceAgent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #f0f3f7;
        --text: #171a1f;
        --muted: #657080;
        --line: #d9dee7;
        --brand: #176b87;
        --brand-strong: #0f4f66;
        --accent: #f29f05;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-columns: 300px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 18px;
        border-right: 1px solid var(--line);
        background: #101820;
        color: #f8fafc;
        padding: 18px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: 24px;
      }

      .brand p {
        margin: 0;
        color: #b9c3cf;
        font-size: 13px;
        line-height: 1.45;
      }

      .new-chat {
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #15110a;
        padding: 11px 12px;
        font-weight: 700;
      }

      .section-title {
        margin: 0 0 8px;
        color: #c9d3df;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .chat-list {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 8px;
        overflow: auto;
        min-height: 120px;
      }

      .chat-item {
        width: 100%;
        overflow: hidden;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        color: #e8edf3;
        padding: 10px;
        text-align: left;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chat-item:hover,
      .chat-item.active {
        border-color: #344557;
        background: #1a2735;
      }

      .settings {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 13px;
        font-weight: 700;
      }

      select,
      textarea {
        width: 100%;
        border: 1px solid #344557;
        border-radius: 8px;
        background: #0c131b;
        color: #f8fafc;
        padding: 10px;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      .toggle {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }

      .toggle input {
        width: 18px;
        height: 18px;
      }

      .danger {
        border: 1px solid #5c2b27;
        border-radius: 8px;
        background: #2a1110;
        color: #ffd6d2;
        padding: 10px;
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        min-width: 0;
        min-height: 100vh;
      }

      .topbar {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        padding: 18px 28px;
        backdrop-filter: blur(12px);
      }

      .topbar h2 {
        margin: 0;
        font-size: 20px;
      }

      .topbar p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .messages {
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow: auto;
        padding: 28px;
      }

      .empty {
        margin: auto;
        max-width: 560px;
        text-align: center;
      }

      .empty h3 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .empty p {
        margin: 0;
        color: var(--muted);
      }

      .message {
        display: grid;
        grid-template-columns: 38px minmax(0, 760px);
        gap: 12px;
        align-items: start;
      }

      .message.user {
        justify-content: end;
      }

      .avatar {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--brand-strong);
        font-weight: 800;
      }

      .bubble {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 14px 16px;
        line-height: 1.6;
        box-shadow: 0 8px 22px rgba(21, 30, 43, 0.06);
      }

      .user .bubble {
        border-color: #c4d7df;
        background: #e7f3f7;
      }

      .bubble > :first-child {
        margin-top: 0;
      }

      .bubble > :last-child {
        margin-bottom: 0;
      }

      pre {
        overflow: auto;
        border-radius: 8px;
        background: #111827;
        color: #f8fafc;
        padding: 14px;
      }

      code {
        border-radius: 5px;
        background: #eef2f7;
        padding: 2px 4px;
      }

      pre code {
        background: transparent;
        padding: 0;
      }

      .sources {
        margin-top: 12px;
        border-top: 1px solid var(--line);
        padding-top: 12px;
      }

      .source-label {
        display: inline-flex;
        margin-bottom: 8px;
        border-radius: 999px;
        background: #e7f6ef;
        color: #10613d;
        padding: 4px 9px;
        font-size: 12px;
        font-weight: 800;
      }

      .source {
        display: block;
        margin-top: 8px;
        color: var(--brand-strong);
        font-weight: 700;
        text-decoration: none;
      }

      .source-content {
        margin: 2px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .composer {
        border-top: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.9);
        padding: 18px 28px;
      }

      .composer-inner {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        max-width: 940px;
        margin: 0 auto;
      }

      .composer textarea {
        min-height: 54px;
        max-height: 180px;
        border-color: var(--line);
        background: var(--panel);
        color: var(--text);
      }

      .send {
        align-self: end;
        border: 0;
        border-radius: 8px;
        background: var(--brand);
        color: white;
        padding: 14px 18px;
        font-weight: 800;
      }

      .send:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .status {
        min-height: 20px;
        max-width: 940px;
        margin: 8px auto 0;
        color: var(--danger);
        font-size: 13px;
      }

      @media (max-width: 820px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          min-height: auto;
        }

        .main {
          min-height: 70vh;
        }

        .messages,
        .topbar,
        .composer {
          padding-left: 16px;
          padding-right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>SourceAgent</h1>
          <p>Groq research agent with Tavily search, saved chats, and transparent sources.</p>
        </div>

        <button class="new-chat" id="newChatButton">New chat</button>

        <section>
          <p class="section-title">Previous chats</p>
          <div class="chat-list" id="chatList"></div>
        </section>

        <section class="settings">
          <p class="section-title">Agent settings</p>
          <label>
            Groq model
            <select id="modelSelect">
              <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
              <option value="mixtral-8x7b-32768">mixtral-8x7b-32768</option>
            </select>
          </label>

          <label>
            Memory mode
            <select id="memoryMode">
              <option>No memory</option>
              <option selected>Session memory</option>
              <option>Summarized memory</option>
            </select>
          </label>

          <label class="toggle">
            Tavily web search
            <input id="searchToggle" type="checkbox" />
          </label>

          <label>
            System prompt
            <textarea id="systemPrompt" placeholder="Example: You are a concise technical mentor."></textarea>
          </label>

          <button class="danger" id="deleteChatButton">Delete current chat</button>
        </section>
      </aside>

      <main class="main">
        <header class="topbar">
          <h2 id="chatTitle">New chat</h2>
          <p>Ask normally. Enable search when you need current information or sources.</p>
        </header>

        <section class="messages" id="messages"></section>

        <form class="composer" id="composer">
          <div class="composer-inner">
            <textarea id="promptInput" placeholder="Ask anything..." required></textarea>
            <button class="send" id="sendButton" type="submit">Send</button>
          </div>
          <div class="status" id="status"></div>
        </form>
      </main>
    </div>

    <script>
      const STORAGE_KEY = "sourceagent.chats.v1";
      const API_BASE =
        window.SOURCEAGENT_API_BASE ||
        (window.location.port === "8501" ? "http://127.0.0.1:9999" : "");
      const state = {
        chats: [],
        activeChatId: null,
        loading: false,
      };

      const elements = {
        chatList: document.querySelector("#chatList"),
        messages: document.querySelector("#messages"),
        chatTitle: document.querySelector("#chatTitle"),
        promptInput: document.querySelector("#promptInput"),
        composer: document.querySelector("#composer"),
        sendButton: document.querySelector("#sendButton"),
        status: document.querySelector("#status"),
        modelSelect: document.querySelector("#modelSelect"),
        memoryMode: document.querySelector("#memoryMode"),
        searchToggle: document.querySelector("#searchToggle"),
        systemPrompt: document.querySelector("#systemPrompt"),
        newChatButton: document.querySelector("#newChatButton"),
        deleteChatButton: document.querySelector("#deleteChatButton"),
      };

      function now() {
        return new Date().toISOString();
      }

      function createChat() {
        return {
          id: crypto.randomUUID(),
          title: "New chat",
          messages: [],
          memorySummary: "",
          createdAt: now(),
          updatedAt: now(),
        };
      }

      function loadChats() {
        try {
          state.chats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        } catch {
          state.chats = [];
        }
        if (!state.chats.length) {
          const chat = createChat();
          state.chats.push(chat);
        }
        state.chats.sort((a, b) => b.updatedAt.localeCompare(a.updatedAt));
        state.activeChatId = state.activeChatId || state.chats[0].id;
      }

      function saveChats() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.chats));
      }

      function activeChat() {
        return state.chats.find((chat) => chat.id === state.activeChatId);
      }

      function setActiveChat(chatId) {
        state.activeChatId = chatId;
        render();
      }

      function titleFromMessage(message) {
        return message.length > 52 ? `${message.slice(0, 52)}...` : message;
      }

      function markdownToHtml(markdown) {
        return DOMPurify.sanitize(marked.parse(markdown || ""));
      }

      function renderChatList() {
        elements.chatList.innerHTML = "";
        state.chats.forEach((chat) => {
          const button = document.createElement("button");
          button.className = `chat-item${chat.id === state.activeChatId ? " active" : ""}`;
          button.textContent = chat.title;
          button.addEventListener("click", () => setActiveChat(chat.id));
          elements.chatList.appendChild(button);
        });
      }

      function renderSources(sources) {
        if (!sources || !sources.length) return "";
        const items = sources
          .map((source, index) => {
            const title = source.title || source.url;
            const content = source.content ? `<p class="source-content">${source.content.slice(0, 260)}</p>` : "";
            return `
              <a class="source" href="${source.url}" target="_blank" rel="noreferrer">
                ${index + 1}. ${title}
              </a>
              ${content}
            `;
          })
          .join("");
        return `
          <div class="sources">
            <span class="source-label">Used web search</span>
            ${items}
          </div>
        `;
      }

      function renderMessages() {
        const chat = activeChat();
        elements.chatTitle.textContent = chat.title;
        elements.messages.innerHTML = "";

        if (!chat.messages.length) {
          elements.messages.innerHTML = `
            <div class="empty">
              <h3>Start a new conversation</h3>
              <p>Your chats are saved in this browser, and you can return to them from the sidebar.</p>
            </div>
          `;
          return;
        }

        chat.messages.forEach((message) => {
          const article = document.createElement("article");
          article.className = `message ${message.role}`;
          const avatar = message.role === "user" ? "You" : "AI";
          article.innerHTML = `
            <div class="avatar">${avatar}</div>
            <div class="bubble">
              ${markdownToHtml(message.content)}
              ${message.role === "assistant" ? renderSources(message.sources) : ""}
            </div>
          `;
          elements.messages.appendChild(article);
        });
        elements.messages.scrollTop = elements.messages.scrollHeight;
      }

      function render() {
        renderChatList();
        renderMessages();
      }

      function backendMessages(userMessage) {
        const chat = activeChat();
        const current = { role: "user", content: userMessage };
        if (elements.memoryMode.value === "No memory") {
          return [current];
        }
        const history =
          elements.memoryMode.value === "Summarized memory"
            ? chat.messages.slice(-8)
            : chat.messages;
        return history.map(({ role, content }) => ({ role, content })).concat(current);
      }

      async function summarizeMemory(modelName, userMessage, assistantMessage) {
        const chat = activeChat();
        const response = await fetch(`${API_BASE}/api/memory/summarize`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model_name: modelName,
            previous_summary: chat.memorySummary || "",
            messages: [
              { role: "user", content: userMessage },
              { role: "assistant", content: assistantMessage },
            ],
          }),
        });
        if (!response.ok) return;
        const data = await response.json();
        chat.memorySummary = data.summary;
      }

      async function askAgent(userMessage) {
        const chat = activeChat();
        const modelName = elements.modelSelect.value;
        const payload = {
          model_name: modelName,
          system_prompt: elements.systemPrompt.value,
          messages: backendMessages(userMessage),
          allow_search: elements.searchToggle.checked,
          memory_summary:
            elements.memoryMode.value === "Summarized memory"
              ? chat.memorySummary || ""
              : "",
        };

        const response = await fetch(`${API_BASE}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "Agent request failed.");
        }

        return response.json();
      }

      function setLoading(isLoading) {
        state.loading = isLoading;
        elements.sendButton.disabled = isLoading;
        elements.sendButton.textContent = isLoading ? "Thinking" : "Send";
      }

      elements.composer.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (state.loading) return;

        const userMessage = elements.promptInput.value.trim();
        if (!userMessage) return;

        const chat = activeChat();
        chat.messages.push({ role: "user", content: userMessage });
        chat.updatedAt = now();
        if (chat.title === "New chat") chat.title = titleFromMessage(userMessage);
        elements.promptInput.value = "";
        elements.status.textContent = "";
        saveChats();
        render();
        setLoading(true);

        try {
          const result = await askAgent(userMessage);
          chat.messages.push({
            role: "assistant",
            content: result.response,
            sources: result.sources || [],
            usedSearch: result.used_search,
          });
          if (elements.memoryMode.value === "Summarized memory") {
            await summarizeMemory(elements.modelSelect.value, userMessage, result.response);
          }
          chat.updatedAt = now();
          saveChats();
          render();
        } catch (error) {
          elements.status.textContent = error.message;
        } finally {
          setLoading(false);
        }
      });

      elements.newChatButton.addEventListener("click", () => {
        const chat = createChat();
        state.chats.unshift(chat);
        state.activeChatId = chat.id;
        saveChats();
        render();
      });

      elements.deleteChatButton.addEventListener("click", () => {
        state.chats = state.chats.filter((chat) => chat.id !== state.activeChatId);
        if (!state.chats.length) state.chats.push(createChat());
        state.activeChatId = state.chats[0].id;
        saveChats();
        render();
      });

      elements.promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          elements.composer.requestSubmit();
        }
      });

      loadChats();
      render();
    </script>
  </body>
</html>
